{% extends "base.html" %}
{% block title %}SSB Stats - Events{% endblock %}

{% block content %}
<section class="seasons-section">
    <h1 class="section-title">PPV Events</h1>
    <p class="section-subtitle">Every pay-per-view card in league history</p>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading events...</p>
    </div>

    <div id="eventsContent" style="display:none;">
        <div id="seasonGroups"></div>
    </div>

    <!-- Fight card overlay -->
    <div id="eventOverlay" class="event-overlay" style="display:none;" onclick="closeOverlay(event)">
        <div class="event-overlay-panel glass-card">
            <div class="event-overlay-header">
                <div>
                    <h2 class="event-overlay-title" id="overlayTitle"></h2>
                    <p class="event-overlay-meta" id="overlayMeta"></p>
                </div>
                <button class="event-overlay-close" onclick="closeOverlay()">&times;</button>
            </div>
            <div class="loading-overlay" id="overlayLoading" style="display:none;position:relative;min-height:80px;">
                <div class="spinner"></div>
            </div>
            <div id="overlayFights" class="fight-list"></div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
let allEvents = [];

document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/events')
        .then(r => r.json())
        .then(data => {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('eventsContent').style.display = 'block';
            allEvents = data;
            renderEvents(data);
        })
        .catch(() => {
            document.getElementById('loadingOverlay').innerHTML = '<p>Error loading events.</p>';
        });
});

function renderEvents(events) {
    const container = document.getElementById('seasonGroups');
    container.innerHTML = '';

    // Group by season (already sorted season desc)
    const bySeason = {};
    const seasonOrder = [];
    events.forEach(e => {
        const s = e.Season;
        if (!bySeason[s]) { bySeason[s] = []; seasonOrder.push(s); }
        bySeason[s].push(e);
    });

    seasonOrder.forEach(season => {
        const group = document.createElement('div');
        group.className = 'event-season-group';

        const heading = document.createElement('h2');
        heading.className = 'event-season-heading';
        heading.textContent = `Season ${season}`;
        group.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'event-grid';

        bySeason[season].forEach(ev => {
            const card = document.createElement('div');
            card.className = 'event-card glass-card';
            card.innerHTML = `
                <div class="event-card-name">${ev.PPV_Name}</div>
                <div class="event-card-meta">Season ${ev.Season} &bull; Month ${ev.Month}</div>
                <div class="event-card-stats">
                    <span class="event-stat">${ev.fight_count} fight${ev.fight_count != 1 ? 's' : ''}</span>
                    ${parseInt(ev.title_fights) > 0 ? `<span class="event-stat event-stat-title">👑 ${ev.title_fights} title match${ev.title_fights != 1 ? 'es' : ''}</span>` : ''}
                </div>
                <div class="event-card-action">View Card &rsaquo;</div>
            `;
            card.addEventListener('click', () => openEvent(ev));
            group.appendChild(card);
        });

        group.appendChild(grid);
        container.appendChild(group);
    });
}

function openEvent(ev) {
    document.getElementById('overlayTitle').textContent = ev.PPV_Name;
    document.getElementById('overlayMeta').textContent = `Season ${ev.Season} · Month ${ev.Month}`;
    document.getElementById('overlayFights').innerHTML = '';
    document.getElementById('overlayLoading').style.display = 'flex';
    document.getElementById('eventOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';

    fetch(`/api/fights?ppv=${encodeURIComponent(ev.PPV_Name)}&season=${ev.Season}&page=1`)
        .then(r => r.json())
        .then(fights => {
            document.getElementById('overlayLoading').style.display = 'none';
            const list = document.getElementById('overlayFights');
            if (!Array.isArray(fights) || !fights.length) {
                list.innerHTML = '<div class="fight-empty">No fights found.</div>';
                return;
            }
            fights.forEach(f => list.appendChild(renderFight(f)));
        })
        .catch(() => {
            document.getElementById('overlayLoading').style.display = 'none';
            document.getElementById('overlayFights').innerHTML = '<div class="fight-empty">Error loading fights.</div>';
        });
}

function closeOverlay(e) {
    if (e && e.target !== document.getElementById('eventOverlay')) return;
    document.getElementById('eventOverlay').style.display = 'none';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeOverlay();
});
</script>
{% endblock %}
