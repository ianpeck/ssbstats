{% extends "base.html" %}
{% block title %}SSB Stats - Fight Log{% endblock %}

{% block content %}
<section class="seasons-section">
    <h1 class="section-title">Fight Log</h1>
    <p class="section-subtitle">Complete record of every fight</p>

    <!-- Filter bar -->
    <div class="fight-filters glass-card">
        <div class="fight-filter-grid">
            <div class="fight-filter-group">
                <label>Fighter</label>
                <div class="autocomplete-wrapper">
                    <input type="text" id="filterFighter" class="fight-filter-input"
                           placeholder="Type a name..." autocomplete="off">
                    <div class="autocomplete-dropdown"></div>
                </div>
            </div>
            <div class="fight-filter-group">
                <label>Result</label>
                <select id="filterDecision" class="fight-filter-input">
                    <option value="">All Results</option>
                    <option value="W">Wins Only</option>
                    <option value="L">Losses Only</option>
                </select>
            </div>
            <div class="fight-filter-group">
                <label>Season</label>
                <select id="filterSeason" class="fight-filter-input">
                    <option value="">All Seasons</option>
                    {% for s in seasons %}<option value="{{ s }}">Season {{ s }}</option>{% endfor %}
                </select>
            </div>
            <div class="fight-filter-group">
                <label>Month</label>
                <select id="filterMonth" class="fight-filter-input">
                    <option value="">All Months</option>
                    {% for m in range(1,13) %}<option value="{{ m }}">Month {{ m }}</option>{% endfor %}
                </select>
            </div>
            <div class="fight-filter-group">
                <label>Fight Type</label>
                <select id="filterFightType" class="fight-filter-input">
                    <option value="">All Types</option>
                    {% for t in fight_types %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
                </select>
            </div>
            <div class="fight-filter-group">
                <label>Location</label>
                <select id="filterLocation" class="fight-filter-input">
                    <option value="">All Locations</option>
                    {% for l in locations %}<option value="{{ l }}">{{ l }}</option>{% endfor %}
                </select>
            </div>
            <div class="fight-filter-group">
                <label>PPV</label>
                <select id="filterPPV" class="fight-filter-input">
                    <option value="">All PPVs</option>
                    {% for p in ppvs %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
                </select>
            </div>
            <div class="fight-filter-group">
                <label>Championship</label>
                <select id="filterChampionship" class="fight-filter-input">
                    <option value="">All Championships</option>
                    {% for c in championships %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                </select>
            </div>
            <div class="fight-filter-group">
                <label>Brand</label>
                <select id="filterBrand" class="fight-filter-input">
                    <option value="">All Brands</option>
                    {% for b in brands %}<option value="{{ b }}">{{ b }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="fight-filter-actions">
            <button class="btn-outline" id="clearFilters">Clear Filters</button>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading fights...</p>
    </div>

    <div id="fightList" class="fight-list" style="display:none;"></div>

    <div id="loadMoreContainer" style="text-align:center;margin-top:1.25rem;display:none;">
        <button class="btn-outline" id="loadMoreBtn">Load More</button>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
// isWinner, chipHTML, renderFight are defined in app.js
const PER_PAGE = 100;
let currentPage    = 1;
let currentFilters = {};
let hasMore        = true;
let loadInProgress = false;

function debounce(fn, ms) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function getFilters() {
    return {
        fighter:      document.getElementById('filterFighter').value.trim(),
        decision:     document.getElementById('filterDecision').value,
        season:       document.getElementById('filterSeason').value,
        month:        document.getElementById('filterMonth').value,
        fight_type:   document.getElementById('filterFightType').value,
        location:     document.getElementById('filterLocation').value,
        ppv:          document.getElementById('filterPPV').value,
        championship: document.getElementById('filterChampionship').value,
        brand:        document.getElementById('filterBrand').value,
    };
}

function buildQuery(page) {
    const params = new URLSearchParams();
    Object.entries(currentFilters).forEach(([k, v]) => { if (v) params.set(k, v); });
    params.set('page', page);
    return `/api/fights?${params}`;
}

function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('fightList').style.display = 'none';
    document.getElementById('loadMoreContainer').style.display = 'none';
}

function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('fightList').style.display = 'flex';
}

function loadFights(reset = false) {
    if (loadInProgress) return;
    if (reset) {
        currentPage = 1;
        hasMore     = true;
        document.getElementById('fightList').innerHTML = '';
    }
    loadInProgress = true;
    showLoading();

    fetch(buildQuery(currentPage))
        .then(r => r.json())
        .then(fights => {
            hideLoading();
            loadInProgress = false;
            const list = document.getElementById('fightList');

            if (fights.error) {
                list.innerHTML = `<div class="fight-empty">Error: ${fights.error}</div>`;
                return;
            }

            if (!Array.isArray(fights) || fights.length === 0) {
                if (reset) list.innerHTML = '<div class="fight-empty">No fights found for these filters.</div>';
                hasMore = false;
                document.getElementById('loadMoreContainer').style.display = 'none';
                return;
            }

            fights.forEach(f => list.appendChild(renderFight(f)));
            hasMore = fights.length >= PER_PAGE;
            document.getElementById('loadMoreContainer').style.display = hasMore ? 'block' : 'none';
        })
        .catch(() => {
            hideLoading();
            loadInProgress = false;
            document.getElementById('fightList').innerHTML =
                '<div class="fight-empty">Failed to load fights. Check your connection and try again.</div>';
        });
}

document.addEventListener('DOMContentLoaded', () => {
    const dropdownIds = ['filterDecision','filterSeason','filterMonth','filterFightType',
                         'filterLocation','filterPPV','filterChampionship','filterBrand'];

    dropdownIds.forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
            currentFilters = getFilters();
            loadFights(true);
        });
    });

    const fighterInput = document.getElementById('filterFighter');
    setupAutocomplete(fighterInput, 'fighters');

    const debouncedLoad = debounce(() => {
        currentFilters = getFilters();
        loadFights(true);
    }, 350);
    fighterInput.addEventListener('input', debouncedLoad);
    fighterInput.addEventListener('change', () => {
        currentFilters = getFilters();
        loadFights(true);
    });

    document.getElementById('clearFilters').addEventListener('click', () => {
        dropdownIds.forEach(id => { document.getElementById(id).selectedIndex = 0; });
        fighterInput.value = '';
        currentFilters = {};
        loadFights(true);
    });

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
        currentPage++;
        loadFights(false);
    });

    loadFights(true);
});
</script>
{% endblock %}
